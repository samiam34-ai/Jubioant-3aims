<style>
  :root{
    --paper:#faf8f3; --ink:#1b1d1a; --mute:#8a8b83; --rule:#e4e1d8;
    --accent:#0f746b; --life:#b06a2c;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);}
  body{min-height:100vh;min-height:100dvh;display:flex;justify-content:center;
       padding:max(2.5rem,env(safe-area-inset-top)) 1.25rem calc(2.5rem + env(safe-area-inset-bottom));}
  .wrap{width:100%;max-width:36rem;}
  .top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:.25rem;}
  .eyebrow{font-family:var(--mono);color:var(--mute);font-size:11px;letter-spacing:.25em;text-transform:uppercase;}
  .count{font-family:var(--mono);color:var(--mute);font-size:11px;letter-spacing:.03em;}
  .datebar{display:flex;align-items:baseline;gap:.75rem;margin-bottom:2rem;}
  .nav{background:none;border:none;color:var(--mute);font-size:1.4rem;line-height:1;cursor:pointer;transition:opacity .15s;}
  .nav:hover{opacity:.55;}
  .date{font-size:30px;line-height:1;font-weight:600;letter-spacing:-.02em;}
  @media(min-width:480px){.date{font-size:34px;}}
  .today-link{color:var(--accent);font-family:var(--mono);font-size:11px;background:none;border:none;cursor:pointer;margin-top:.3rem;padding:0;}
  .today-link:hover{text-decoration:underline;}
  .row{border-bottom:1px solid var(--rule);padding:1rem 0;display:flex;align-items:flex-start;gap:1rem;}
  .mark{margin-top:2px;flex-shrink:0;width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;
        border:1.5px solid var(--rule);background:transparent;color:var(--mute);font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .mark.done{border-color:var(--accent);background:var(--accent);color:var(--paper);}
  .body{flex:1;min-width:0;}
  textarea{width:100%;background:transparent;border:none;outline:none;resize:none;overflow:hidden;
           font-family:var(--sans);font-size:17px;line-height:1.4;color:var(--ink);}
  textarea::placeholder{color:var(--mute);opacity:.5;}
  textarea.done{color:var(--mute);text-decoration:line-through;}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;background:none;border:none;cursor:pointer;
       margin-top:.25rem;padding:0;opacity:.7;transition:opacity .15s;}
  .tag:hover{opacity:1;}
  .tag.work{color:var(--accent);} .tag.life{color:var(--life);}
  .hist-label{font-family:var(--mono);color:var(--mute);font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin:3rem 0 .75rem;}
  .grid{display:flex;gap:6px;flex-wrap:wrap;}
  .cell{width:24px;height:24px;border-radius:3px;border:1px solid var(--rule);background:transparent;cursor:pointer;transition:transform .12s;}
  .cell:hover{transform:scale(1.12);}
  .foot{font-family:var(--mono);color:var(--mute);font-size:10px;line-height:1.6;border-top:1px solid var(--rule);margin-top:2.5rem;padding-top:.75rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="eyebrow">Three aims</div>
    <div class="count" id="count"></div>
  </div>
  <div class="datebar">
    <button class="nav" id="prev" aria-label="Previous day">‹</button>
    <div>
      <div class="date" id="date"></div>
      <button class="today-link" id="todayLink" style="display:none">jump to today →</button>
    </div>
    <button class="nav" id="next" aria-label="Next day">›</button>
  </div>
  <div id="aims"></div>
  <div class="hist-label">Last three weeks</div>
  <div class="grid" id="grid"></div>
  <div class="foot">Saved on this device. Three is the point — if everything is a priority, nothing is.</div>
</div>

<script>
const WEEKDAY=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTH=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const KEY="threeAims.journal";
const pad=n=>String(n).padStart(2,"0");
const keyOf=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const sameDay=(a,b)=>keyOf(a)===keyOf(b);
const emptyDay=()=>({aims:[{text:"",done:false,tag:"work"},{text:"",done:false,tag:"work"},{text:"",done:false,tag:"work"}]});

let journal={};
try{journal=JSON.parse(localStorage.getItem(KEY))||{};}catch(e){journal={};}
let cursor=new Date();
let saveTimer=null;

function save(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{try{localStorage.setItem(KEY,JSON.stringify(journal));}catch(e){}},400);
}
function day(){const k=keyOf(cursor);if(!journal[k])journal[k]=emptyDay();return journal[k];}

function render(){
  const d=day();
  const isToday=sameDay(cursor,new Date());
  const done=d.aims.filter(a=>a.text.trim()&&a.done).length;
  const filled=d.aims.filter(a=>a.text.trim()).length;
  document.getElementById("count").textContent=`${done}/${filled||3} done`;
  document.getElementById("date").textContent=`${WEEKDAY[cursor.getDay()]} ${cursor.getDate()} ${MONTH[cursor.getMonth()]}`;
  document.getElementById("todayLink").style.display=isToday?"none":"block";

  const aimsEl=document.getElementById("aims");
  aimsEl.innerHTML="";
  d.aims.forEach((aim,i)=>{
    const isDone=aim.done&&aim.text.trim();
    const row=document.createElement("div");row.className="row";
    const mark=document.createElement("button");
    mark.className="mark"+(isDone?" done":"");
    mark.textContent=isDone?"✓":(i+1);
    mark.onclick=()=>{aim.done=!aim.done;save();render();};
    const bodyEl=document.createElement("div");bodyEl.className="body";
    const ta=document.createElement("textarea");
    ta.className=isDone?"done":"";
    ta.rows=1;ta.spellcheck=false;ta.value=aim.text;
    ta.placeholder=i===0?"The one that matters most…":"Aim…";
    const grow=()=>{ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";};
    ta.addEventListener("input",()=>{aim.text=ta.value;grow();save();updateCount();updateTag();});
    let tagBtn=null;
    function updateTag(){
      if(aim.text.trim()&&!tagBtn){
        tagBtn=document.createElement("button");
        bodyEl.appendChild(tagBtn);paintTag();
      }else if(!aim.text.trim()&&tagBtn){tagBtn.remove();tagBtn=null;}
    }
    function paintTag(){if(!tagBtn)return;tagBtn.className="tag "+aim.tag;tagBtn.textContent=aim.tag;
      tagBtn.onclick=()=>{aim.tag=aim.tag==="work"?"life":"work";paintTag();save();};}
    bodyEl.appendChild(ta);
    if(aim.text.trim()){tagBtn=document.createElement("button");bodyEl.appendChild(tagBtn);paintTag();}
    row.appendChild(mark);row.appendChild(bodyEl);aimsEl.appendChild(row);
    requestAnimationFrame(grow);
  });
  renderGrid();
}
function updateCount(){
  const d=day();
  const done=d.aims.filter(a=>a.text.trim()&&a.done).length;
  const filled=d.aims.filter(a=>a.text.trim()).length;
  document.getElementById("count").textContent=`${done}/${filled||3} done`;
}
function renderGrid(){
  const grid=document.getElementById("grid");grid.innerHTML="";
  for(let i=20;i>=0;i--){
    const dd=addDays(new Date(),-i);
    const rec=journal[keyOf(dd)];
    const done=rec?rec.aims.filter(a=>a.text.trim()&&a.done).length:0;
    const has=rec?rec.aims.filter(a=>a.text.trim()).length:0;
    const active=sameDay(dd,cursor);
    const ratio=has?done/3:0;
    const cell=document.createElement("button");
    cell.className="cell";
    cell.title=`${keyOf(dd)} — ${done}/3`;
    if(has){cell.style.background=`rgba(15,116,107,${0.18+ratio*0.82})`;cell.style.borderColor=active?"var(--ink)":"transparent";}
    else{cell.style.borderColor=active?"var(--ink)":"var(--rule)";}
    cell.onclick=()=>{cursor=new Date(dd);render();};
    grid.appendChild(cell);
  }
}
document.getElementById("prev").onclick=()=>{cursor=addDays(cursor,-1);render();};
document.getElementById("next").onclick=()=>{cursor=addDays(cursor,1);render();};
document.getElementById("todayLink").onclick=()=>{cursor=new Date();render();};
render();


</script>
</body>
</html>
